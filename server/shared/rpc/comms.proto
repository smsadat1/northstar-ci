syntax = "proto3";

package northstar;

option go_package = "./pb";

import "google/protobuf/timestamp.proto";


service TaskQueueService {
    // nsrunner pulls tasks via this outbound endpoint
    rpc FetchNextTask(RunnerIdentity) returns (NSRTaskResponse);
    // nsrunner pushes its 15-second system metrics here
    rpc SendHeartBeat(NSRHeartBeat) returns (NSRTaskResponse);
}

message RunnerIdentity {
    string owner_id = 1;
    string runner_id = 2;
    string runner_ip = 3;
    string version = 4;
}

message NSRTaskResponse {
    bool has_task = 1;
    NSRTask task = 2;
    bool has_deploy = 3;
    NSRDeployInstruction deploy = 4;
}

message NSRTask {
    string s3url = 4;

    uint32 timeout_sec = 5;
    uint64 memory_limit_mb = 6;
    uint64 max_stdout_kb = 7;
    uint64 cpu_shares = 8;
    uint64 diskt_limits = 9;

    string lint_runtime = 10;
    string lint_command = 11;
    map<string, string> lint_env = 12;

    string build_runtime = 13;
    string build_command = 14;
    map<string, string> build_env = 15;

    string test_runtime = 16;
    string test_command = 17;
    map<string, string> test_env = 18;
}

message NSRDeployInstruction {
    string deploy_runtime = 1;
    map<string, string> deploy_env = 2;
    string command = 3;
    repeated string steps = 4;
}

message NSRHeartBeat {
    // identity
    string owner_id = 1;
    string runner_id = 2;
    string runner_ip = 3;
    string region = 4;

    // system
    double cpu_percent = 5;
    double mem_percent = 6;
    double disk_percent = 7;

    // metadata
    google.protobuf.Timestamp heartbeat_time = 8;
}